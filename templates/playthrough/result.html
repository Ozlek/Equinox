{% extends 'base.html' %}

{% block content %}
<div class="text-center">
    <h1 class="mb-4">Playthrough Complete!</h1>

    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h3>{{ topic.name }}</h3>
            
            <h2 class="my-4">{{ score }}/{{ total }}</h2>

            <p class="text-muted">
                Final Adaptive Tier Achieved: <strong>{{ difficulty }}</strong>
            </p>

            <a href="/topics/" class="btn btn-primary">Return to Topics</a>
        </div>
    </div>
</div>
{% endblock %}
